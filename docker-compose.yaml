services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      # Grafana 13 enables splashScreen by default; the overlay blocks Playwright interactions.
      GF_FEATURE_TOGGLES_splashScreen: 'false'
    configs:
      # Run the externalized plugin in place of the core Parca plugin.
      # Without as_external=true, DuplicatePluginIDValidation (pkg/services/pluginsintegration/pipeline/steps.go)
      # drops the external plugin because the core one is already registered under id=parca.
      - source: grafana_custom_ini
        target: /etc/grafana/grafana.ini

configs:
  grafana_custom_ini:
    content: |
      [plugin.parca]
      as_external = true
